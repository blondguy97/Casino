<!DOCTYPE html>
<html lang="en">

<head>

    <script src="main.js" defer></script>
  <link rel="shortcut icon" href="favicon.ico">

    <link rel="stylesheet" href="style.css">
    <title>Casino</title>
</head>


<body>

    <div class="wrapper">


        <h1>КАЗИНО!</h1>

        <p class="money">Все твои деньги: <span></span></p>

        <button class="btn retry-btn">Играть заново</button>
    </div>
